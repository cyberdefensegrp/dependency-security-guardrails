# Example: Drop-in workflow (standalone, no external dependency)
# Copy this directly into any project repo at .github/workflows/supply-chain-check.yml
# Self-contained; does not call any external workflow.
#
# Tradeoff: simpler, but you update each repo individually.

name: Supply Chain Security

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - "requirements.txt"
      - "requirements*.txt"
      - "pyproject.toml"
      - "uv.lock"
      - "Pipfile.lock"

permissions:
  contents: read
  pull-requests: write

jobs:
  npm-check:
    name: npm Security
    if: hashFiles('package.json') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify lockfile exists
        run: |
          if [ -f "package.json" ] && [ ! -f "package-lock.json" ] && [ ! -f "yarn.lock" ] && [ ! -f "pnpm-lock.yaml" ]; then
            echo "::error::No lockfile found. A lockfile must be committed."
            exit 1
          fi

      - name: Check for floating version ranges
        run: |
          if [ -f "package.json" ]; then
            FLOATS=$(jq -r '
              (.dependencies // {}) + (.devDependencies // {}) |
              to_entries[] |
              select(.value | test("[\\^~*x]|>=|>")) |
              "\(.key): \(.value)"
            ' package.json || true)

            if [ -n "$FLOATS" ]; then
              echo "::warning::Floating version ranges detected. Pin to exact versions."
              echo "$FLOATS"
            fi
          fi

      - name: Check .npmrc for ignore-scripts
        run: |
          if [ -f ".npmrc" ]; then
            if grep -q "ignore-scripts=true" .npmrc; then
              echo "ignore-scripts=true is set."
            else
              echo "::warning::.npmrc exists but ignore-scripts is not enabled."
            fi
          else
            echo "::warning::No .npmrc found. Create one with ignore-scripts=true."
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies (with ignore-scripts)
        run: npm ci --ignore-scripts

      - name: Verify npm provenance signatures
        run: npm audit signatures 2>&1 || true

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

  python-check:
    name: Python Security
    if: hashFiles('pyproject.toml') != '' || hashFiles('requirements.txt') != '' || hashFiles('uv.lock') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify lockfile or hashes exist
        run: |
          if [ -f "pyproject.toml" ] && [ ! -f "uv.lock" ] && [ ! -f "requirements.txt" ]; then
            echo "::error::No lockfile found. Commit uv.lock or a hashed requirements.txt."
            exit 1
          fi
          if [ -f "requirements.txt" ]; then
            if ! grep -q "\-\-hash" requirements.txt; then
              echo "::warning::requirements.txt has no hashes. Generate with: uv pip compile --generate-hashes"
            fi
          fi

      - name: Check for unpinned dependencies
        run: |
          if [ -f "requirements.txt" ]; then
            UNPINNED=$(grep -vE '^(#|-|\s*$|.*==|.*--hash)' requirements.txt || true)
            if [ -n "$UNPINNED" ]; then
              echo "::warning::Unpinned dependencies found:"
              echo "$UNPINNED"
            fi
          fi

      - name: Audit with pip-audit
        run: |
          uv pip install pip-audit --system
          if [ -f "requirements.txt" ]; then
            pip-audit -r requirements.txt --strict 2>&1 || true
          elif [ -f "pyproject.toml" ]; then
            pip-audit --strict 2>&1 || true
          fi

  lockfile-diff:
    name: Lockfile Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Summarize lockfile changes
        run: |
          LOCKFILES="package-lock.json yarn.lock pnpm-lock.yaml uv.lock requirements.txt Pipfile.lock"
          echo "## Dependency Changes" >> "$GITHUB_STEP_SUMMARY"
          HAS_CHANGES=false
          for f in $LOCKFILES; do
            if git diff origin/main...HEAD --name-only 2>/dev/null | grep -q "^${f}$"; then
              ADDED=$(git diff origin/main...HEAD -- "$f" | grep -c "^+" || true)
              REMOVED=$(git diff origin/main...HEAD -- "$f" | grep -c "^-" || true)
              echo "- **${f}**: +${ADDED} / -${REMOVED} lines changed" >> "$GITHUB_STEP_SUMMARY"
              HAS_CHANGES=true
            fi
          done
          if [ "$HAS_CHANGES" = false ]; then
            echo "No lockfile changes detected." >> "$GITHUB_STEP_SUMMARY"
          fi
